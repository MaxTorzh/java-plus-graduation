server:
  port: 8081

spring:
  application:
    name: collector
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

---
spring:
  config:
    activate:
      on-profile: default
    import: "configserver:"
  cloud:
    config:
      discovery:
        enabled: true
        serviceId: config-server
      fail-fast: true
      retry:
        useRandomPolicy: true
        max-interval: 6000

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    metadata-map:
      gRPC_port: 9090

grpc:
  server:
    port: 9090

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  topic: stats.user-actions.v1
  enabled: ${KAFKA_ENABLED:true}

---
spring:
  config:
    activate:
      on-profile: github
    import:
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false

eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    metadata-map:
      gRPC_port: 9090

grpc:
  server:
    port: 9090

kafka:
  enabled: false
  bootstrap-servers:
  topic: stats.user-actions.v1

logging:
  level:
    ru.practicum: DEBUG