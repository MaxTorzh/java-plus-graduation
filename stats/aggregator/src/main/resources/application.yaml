server:
  port: 8082

spring:
  application:
    name: aggregator
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

---
spring:
  config:
    activate:
      on-profile: default
    import: "configserver:"
  cloud:
    config:
      discovery:
        enabled: true
        serviceId: config-server
      fail-fast: true
      retry:
        useRandomPolicy: true
        max-interval: 6000

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    metadata-map:
      gRPC_port: 9092

grpc:
  server:
    port: 9092

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  action-topic: stats.user-actions.v1
  similarity-topic: event-similarity
  group-id: aggregator-group
  auto-commit: ${KAFKA_AUTO_COMMIT:true}
  enabled: ${KAFKA_ENABLED:true}

---
spring:
  config:
    activate:
      on-profile: github
    import: ""
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false

eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    metadata-map:
      gRPC_port: 9092

grpc:
  server:
    port: 9092

kafka:
  enabled: false
  bootstrap-servers:
  action-topic: stats.user-actions.v1
  similarity-topic: event-similarity
  group-id: aggregator-group
  auto-commit: true

logging:
  level:
    ru.practicum: DEBUG