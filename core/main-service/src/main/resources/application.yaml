spring:
  application:
    name: main-service
  profiles:
    active: postgres
  config:
    import: "configserver:http://config-server:8888"
  cloud:
    config:
      uri: http://config-server:8888
      fail-fast: true
      retry:
        max-attempts: 60
        initial-interval: 2000
        multiplier: 1.5
        max-interval: 10000
      discovery:
        enabled: false

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://discovery-server:8761/eureka/}
    enabled: true
  instance:
    instance-id: "${spring.application.name}:${random.value}"
    leaseRenewalIntervalInSeconds: 10

stats-server:
  url: http://stats-server:9090